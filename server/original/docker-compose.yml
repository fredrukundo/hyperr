services:
  database:
    image: postgres:latest
    container_name: database
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql

  backend:
    image: node:latest
    container_name: backend
    working_dir: /backend
    volumes:
      - ./backend:/backend
    ports:
      - "7002:8000"
    command: sh -c "npm install && npm install nodemon -g && nodemon app.js"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DB_HOST: database
    depends_on:
      - database

  webserver:
    build: ./webserver
    container_name: webserver
    ports:
      - "7001:80"
    depends_on:
      - backend

volumes:
  db_data:
